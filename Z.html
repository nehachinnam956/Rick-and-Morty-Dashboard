<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap 5 z-index</title>

    <!-- Bootstrap 5 CDN -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{

            background:#f5f5f5;

        }

        .box1{

            width:100px;

            height:100px;

            background:#1f1f1f;

            border-radius:8px;

            position:absolute;

            top:100px;

            left:20px;

        }

        .box2{

            width:100px;

            height:100px;

            background:#1e6df0;

            border-radius:8px;

            position:absolute;

            top:130px;

            left:50px;

        }

        .box3{

            width:100px;

            height:100px;

            background:#198754;

            border-radius:8px;

            position:absolute;

            top:160px;

            left:80px;

        }

    </style>

</head>

<body>

    <h1 class="text-center mt-2">

        Bootstrap 5 z-index

    </h1>

    <div class="position-relative">

        <!-- Black box -->

        <div class="box1 z-1"></div>

        <!-- Blue box -->

        <div class="box2 z-3"></div>

        <!-- Green box -->

        <div class="box3 z-2"></div>

    </div>

</body>

</html>
